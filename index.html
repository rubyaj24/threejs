<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      h1 {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgb(0, 255, 0);
        font-family: 'Pixelify Sans', monospace;
        font-weight: 600;
        border-right: 0.15em solid rgb(0, 255, 0);
        white-space: nowrap;
        overflow: hidden;
        margin: 0 auto;
        animation:
          typing 3.5s steps(30, end),
          blink-caret .75s step-end infinite;
      }

      @keyframes typing {
        from { width: 0 }
        to { width: 260px }
      }

      @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: rgb(0, 255, 0) }
      }

      .glow {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgb(0, 255, 0);
        font-family: 'Pixelify Sans', monospace;
        font-weight: 700;
        text-shadow:
          0 0 5px rgb(0, 255, 0, 0.8),
          0 0 15px rgb(0, 255, 0, 0.7),
          0 0 20px rgb(0, 255, 0, 0.5);
        z-index: 10;
      }

      /* ===== CONTROLS ===== */
      .controls {
        position: fixed;
        top: 70px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 150;
      }
      .ctrl-btn {
        background: rgba(0, 0, 0, 0.7);
        color: rgb(0, 255, 0);
        border: 1px solid rgba(0, 255, 0, 0.4);
        padding: 4px 10px;
        font-family: 'Pixelify Sans', monospace;
        font-size: 0.65rem;
        cursor: pointer;
        text-shadow: 0 0 3px rgba(0, 255, 0, 0.5);
        clip-path: polygon(
          0% 5px, 5px 0%,
          calc(100% - 5px) 0%, 100% 5px,
          100% calc(100% - 5px), calc(100% - 5px) 100%,
          5px 100%, 0% calc(100% - 5px)
        );
        transition: all 0.3s ease;
      }
      .ctrl-btn:hover {
        background: rgba(0, 50, 0, 0.7);
      }
      .ctrl-btn.active {
        background: rgba(0, 50, 0, 0.7);
        box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        border-color: rgb(0, 255, 0, 0.7);
      }

      /* ===== KEYFRAMES ===== */
      @keyframes panelScan {
        0%   { top: 0;    opacity: 0; }
        4%   { opacity: 1; }
        96%  { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 1;   box-shadow: 0 0 8px rgba(0,255,0,0.9); }
        50%      { opacity: 0.25; box-shadow: 0 0 2px rgba(0,255,0,0.2); }
      }

      /* ===== SHARED PANEL STYLES ===== */
      .info-panel, .clock-panel {
        position: fixed;
        z-index: 10;
        color: rgb(0, 255, 0);
        font-family: 'Pixelify Sans', monospace;
        background: rgba(0, 0, 0, 0.88);
        border: 1px solid rgba(0, 255, 0, 0.5);
        box-shadow:
          0 0 12px rgba(0, 255, 0, 0.35),
          0 0 35px rgba(0, 255, 0, 0.07),
          inset 0 0 30px rgba(0, 255, 0, 0.04);
        clip-path: polygon(
          0% 10px, 10px 0%,
          calc(100% - 10px) 0%, 100% 10px,
          100% calc(100% - 10px), calc(100% - 10px) 100%,
          10px 100%, 0% calc(100% - 10px)
        );
        transition: opacity 0.3s ease;
        user-select: none;
        padding: 0;
        overflow: hidden;
      }

      /* Scan line sweep */
      .info-panel::before, .clock-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 1px;
        background: rgba(0, 255, 0, 0.25);
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5), 0 0 4px rgba(0, 255, 0, 0.6);
        animation: panelScan 5s linear infinite;
        pointer-events: none;
        z-index: 1;
      }

      /* Title bar */
      .pnl-bar {
        background: rgba(0, 255, 0, 0.08);
        border-bottom: 1px solid rgba(0, 255, 0, 0.3);
        padding: 3px 14px;
        font-size: 0.7em;
        letter-spacing: 0.12em;
        color: rgba(0, 255, 0, 0.8);
        text-shadow: 0 0 6px rgba(0, 255, 0, 0.35);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pnl-bar::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        background: rgb(0, 255, 0);
        box-shadow: 0 0 6px rgba(0, 255, 0, 0.8);
        clip-path: polygon(0% 2px, 2px 0%, calc(100% - 2px) 0%, 100% 2px, 100% calc(100% - 2px), calc(100% - 2px) 100%, 2px 100%, 0% calc(100% - 2px));
        flex-shrink: 0;
        animation: dotPulse 2s ease-in-out infinite;
      }
      .pnl-bar::after {
        content: '';
        flex: 1;
        height: 0;
        border-bottom: 1px dashed rgba(0, 255, 0, 0.25);
      }

      /* Body */
      .pnl-body {
        padding: 6px 14px 10px;
        font-size: clamp(0.65rem, 1.1vw, 0.85rem);
        line-height: 1.7;
      }

      /* Row with dot-leader */
      .pnl-row {
        display: flex;
        align-items: baseline;
        gap: 4px;
        padding: 1px 0;
        border-bottom: 1px solid rgba(0, 255, 0, 0.06);
      }
      .pnl-row:last-child { border-bottom: none; }

      .pnl-label {
        color: rgba(0, 255, 0, 0.52);
        flex-shrink: 0;
        letter-spacing: 0.05em;
        font-size: 0.9em;
      }
      .pnl-dash {
        flex: 1;
        min-width: 6px;
        border-bottom: 1px dashed rgba(0, 255, 0, 0.18);
        align-self: baseline;
        margin: 0 3px;
        height: 1px;
      }
      .pnl-val {
        color: rgb(0, 255, 0);
        text-shadow: 0 0 10px rgba(0, 255, 0, 0.55), 0 0 3px rgba(0, 255, 0, 0.7);
        font-weight: 600;
        flex-shrink: 0;
        font-size: 1em;
      }

      /* ===== INFO PANEL POSITION ===== */
      .info-panel {
        bottom: 20px;
        left: 20px;
        min-width: 240px;
      }

      /* ===== CLOCK PANEL POSITION ===== */
      .clock-panel {
        bottom: 20px;
        right: 20px;
        min-width: 160px;
        text-align: right;
      }
      .clock-panel .pnl-bar { justify-content: flex-end; }
      .clock-panel .pnl-bar::before { display: none; }
      .clock-panel .pnl-bar::after { display: none; }
      .pnl-time {
        font-size: 1.3em;
        text-shadow: 0 0 12px rgba(0, 255, 0, 0.6), 0 0 3px rgba(0, 255, 0, 0.5);
        font-weight: 700;
        line-height: 1.3;
      }
      .pnl-date {
        color: rgba(0, 255, 0, 0.6);
        font-size: 0.85em;
        letter-spacing: 0.05em;
      }

      /* ===== HUD HIDDEN ===== */
      body.hud-hidden .info-panel,
      body.hud-hidden .clock-panel {
        opacity: 0;
        pointer-events: none;
      }

      /* ===== SCANLINE OVERLAY ===== */
      #scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
        display: none;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.12) 2px,
          rgba(0, 0, 0, 0.12) 4px
        );
      }
      body.show-scanline #scanline { display: block; }

      /* ===== RESPONSIVE: TABLET ===== */
      @media (max-width: 1024px) {
        h1.glow { font-size: 1.4rem; }
        .info-panel { min-width: 200px; }
        .controls { top: 60px; right: 14px; }
      }

      /* ===== RESPONSIVE: MOBILE ===== */
      @media (max-width: 640px) {
        h1.glow {
          font-size: 1.1rem;
          top: 10px;
        }
        @keyframes typing {
          from { width: 0 }
          to { width: 180px }
        }

        .controls {
          top: 45px;
          right: 8px;
          gap: 3px;
        }
        .ctrl-btn {
          padding: 3px 7px;
          font-size: 0.55rem;
        }

        .info-panel {
          bottom: 10px;
          left: 10px;
          min-width: auto;
          cursor: pointer;
        }
        .info-panel::before { display: none; }
        .info-panel .info-content { display: none; }
        .info-panel::after {
          content: '[DATA]';
          font-size: 0.6rem;
          display: block;
          padding: 5px 10px;
        }

        .info-panel.expanded {
          left: 5%;
          bottom: 10px;
          width: 90%;
          min-width: auto;
        }
        .info-panel.expanded .info-content { display: block; }
        .info-panel.expanded::after { content: none; }

        .clock-panel {
          bottom: 10px;
          right: 10px;
          min-width: auto;
          cursor: pointer;
        }
        .clock-panel::before { display: none; }
        .clock-panel .clock-content { display: none; }
        .clock-panel::after {
          content: '[TIME]';
          font-size: 0.6rem;
          display: block;
          padding: 5px 10px;
          text-align: center;
        }

        .clock-panel.expanded {
          right: 5%;
          bottom: 10px;
          width: 90%;
          min-width: auto;
        }
        .clock-panel.expanded .clock-content { display: block; }
        .clock-panel.expanded::after { content: none; }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "jsm/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <h1 class="glow">THE EARTH</h1>

    <!-- Controls -->
    <div class="controls">
      <button id="toggle-scanline" class="ctrl-btn">SCAN</button>
      <button id="toggle-axis" class="ctrl-btn">AXIS</button>
      <button id="toggle-orbit" class="ctrl-btn">ORBT</button>
      <button id="toggle-lock" class="ctrl-btn active">LOCK</button>
      <button id="toggle-hud" class="ctrl-btn active">HUD</button>
    </div>

    <!-- Info panel -->
    <div id="info-panel" class="info-panel">
      <div class="info-content">
        <div class="pnl-bar">SYS.DATA</div>
        <div class="pnl-body">
          <div class="pnl-row">
            <span class="pnl-label">ROTATION</span>
            <span class="pnl-dash"></span>
            <span class="pnl-val" id="rotation-data">0.00°</span>
          </div>
          <div class="pnl-row">
            <span class="pnl-label">ZOOM</span>
            <span class="pnl-dash"></span>
            <span class="pnl-val" id="zoom-data">5.00 AU</span>
          </div>
          <div class="pnl-row">
            <span class="pnl-label">TILT</span>
            <span class="pnl-dash"></span>
            <span class="pnl-val" id="tilt-data">23.44°</span>
          </div>
          <div class="pnl-row">
            <span class="pnl-label">CAM</span>
            <span class="pnl-dash"></span>
            <span class="pnl-val" id="cam-data">+0.00°, +0.00°</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Clock panel -->
    <div id="clock-panel" class="clock-panel">
      <div class="clock-content">
        <div class="pnl-bar">ZULU</div>
        <div class="pnl-body">
          <div class="pnl-time" id="clock-time">00:00:00</div>
          <div class="pnl-date" id="clock-date">01 JAN 2026</div>
        </div>
      </div>
    </div>

    <!-- Scanline overlay -->
    <div id="scanline"></div>

    <script type="module" src="./src/index.js"></script>
  </body>
</html>
